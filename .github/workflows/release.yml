name: Release

on:
  release:
    types: [published]

jobs:
  tokenizers:
    runs-on: ubuntu-latest
    name: Generate tokenizers
    steps:
      - name: Install transformers
        run: pip install -q transformers

      - name: Generate 0.6B tokenizer
        run: |
          python3 -c "
          from transformers import AutoTokenizer
          tok = AutoTokenizer.from_pretrained('Qwen/Qwen3-ASR-0.6B', trust_remote_code=True)
          tok.backend_tokenizer.save('tokenizer-0.6B.json')
          print('Saved tokenizer-0.6B.json')
          "

      - name: Generate 1.7B tokenizer
        run: |
          python3 -c "
          from transformers import AutoTokenizer
          tok = AutoTokenizer.from_pretrained('Qwen/Qwen3-ASR-1.7B', trust_remote_code=True)
          tok.backend_tokenizer.save('tokenizer-1.7B.json')
          print('Saved tokenizer-1.7B.json')
          "

      - name: Upload tokenizer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tokenizers
          path: |
            tokenizer-0.6B.json
            tokenizer-1.7B.json

  build:
    needs: tokenizers
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: Linux x86_64
            backend: tch
            asset-name: asr-linux-x86_64
            libtorch-url: https://download.pytorch.org/libtorch/cpu/libtorch-cxx11-abi-shared-with-deps-2.7.1%2Bcpu.zip
            libtorch-archive: libtorch.zip
            bundle-libtorch: true
          - os: ubuntu-latest
            name: Linux x86_64 (CUDA)
            backend: tch
            asset-name: asr-linux-x86_64-cuda
            libtorch-url: https://download.pytorch.org/libtorch/cu128/libtorch-cxx11-abi-shared-with-deps-2.7.1%2Bcu128.zip
            libtorch-archive: libtorch.zip
            bundle-libtorch: false
          - os: ubuntu-24.04-arm
            name: Linux ARM64
            backend: tch
            asset-name: asr-linux-aarch64
            libtorch-url: https://github.com/second-state/libtorch-releases/releases/download/v2.7.1/libtorch-cxx11-abi-aarch64-2.7.1.tar.gz
            libtorch-archive: libtorch.tar.gz
            bundle-libtorch: true
          - os: macos-latest
            name: macOS ARM64
            backend: mlx
            asset-name: asr-macos-aarch64

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.name }})

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        if: matrix.backend == 'tch'

      - uses: actions/checkout@v4
        if: matrix.backend == 'mlx'
        with:
          submodules: recursive

      - name: Install build tools (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y nasm pkg-config

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Clean build state
        run: rm -f Cargo.lock && cargo clean

      - name: Download libtorch
        if: matrix.backend == 'tch'
        run: curl -Lo ${{ matrix.libtorch-archive }} "${{ matrix.libtorch-url }}"

      - name: Extract libtorch
        if: matrix.backend == 'tch'
        run: |
          if [[ "${{ matrix.libtorch-archive }}" == *.zip ]]; then
            unzip -q ${{ matrix.libtorch-archive }}
          else
            tar xzf ${{ matrix.libtorch-archive }}
          fi

      - name: Set linker flags (Linux only)
        if: matrix.backend == 'tch' && runner.os == 'Linux'
        run: echo "RUSTFLAGS=-C link-arg=-Wl,-rpath-link,${{ github.workspace }}/libtorch/lib -C link-arg=-Wl,-rpath,\$ORIGIN/libtorch/lib" >> "$GITHUB_ENV"

      - name: Build (tch)
        if: matrix.backend == 'tch'
        env:
          LIBTORCH: ${{ github.workspace }}/libtorch
          LIBTORCH_BYPASS_VERSION_CHECK: "1"
        run: cargo build --release --features build-ffmpeg

      - name: Build (mlx)
        if: matrix.backend == 'mlx'
        run: cargo build --release --no-default-features --features mlx,build-ffmpeg

      - name: Download tokenizers
        uses: actions/download-artifact@v4
        with:
          name: tokenizers
          path: tokenizers

      - name: Package release
        run: |
          mkdir ${{ matrix.asset-name }}
          cp target/release/asr ${{ matrix.asset-name }}/asr
          cp -r tokenizers ${{ matrix.asset-name }}/tokenizers
          if [ "${{ matrix.backend }}" = "mlx" ]; then
            cp target/release/build/qwen3_asr-*/out/lib/mlx.metallib ${{ matrix.asset-name }}/
          fi
          if [ "${{ matrix.bundle-libtorch }}" = "true" ]; then
            cp -r libtorch ${{ matrix.asset-name }}/libtorch
          fi
          zip -r ${{ matrix.asset-name }}.zip ${{ matrix.asset-name }}

      - name: Upload release asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name }}" "${{ matrix.asset-name }}.zip"
